services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: uv run celery -A app.tasks.celery_app worker -l info -Q crawl,ai,delivery
    env_file: .env
    depends_on:
      - postgres
      - redis

  beat:
    build: .
    command: uv run celery -A app.tasks.celery_app beat -l info
    env_file: .env
    depends_on:
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: job_master
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pgdata:
